name: Build and Push

on:
  push:
    branches: [main]
    paths:
      - "projects/demo/**"
      - "projects/ingest/**"
      - ".github/workflows/build-push.yml"
  pull_request:
    branches: [main]
    paths:
      - "projects/demo/**"
      - "projects/ingest/**"
      - ".github/workflows/build-push.yml"

env:
  REGISTRY: ghcr.io

jobs:
  build-push-demo:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Lowercase image repo
        run: |
          echo "IMAGE_REPO=${REGISTRY}/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/data-lab-demo" >> "$GITHUB_ENV"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint (ruff)
        run: |
          pip install --quiet ruff
          ruff check projects/demo/app

      - name: Validate compose files
        run: |
          (cd infrastructure && TRAEFIK_DASHBOARD_AUTH=placeholder docker compose config --quiet)
          cp projects/demo/.env.example projects/demo/.env
          (cd projects/demo && docker compose config --quiet)
          (cd projects/demo && DEMO_IMAGE=placeholder docker compose -f docker-compose.prod.yml config --quiet)
          rm projects/demo/.env

      - name: Build and push
        uses: docker/build-push-action@v7.2.0
        with:
          context: projects/demo
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_REPO }}:latest
            ${{ env.IMAGE_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-push-ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Lowercase image repo
        run: |
          echo "IMAGE_REPO=${REGISTRY}/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/data-lab-ingest" >> "$GITHUB_ENV"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint (ruff)
        run: |
          pip install --quiet ruff
          ruff check projects/ingest/app

      - name: Validate compose files
        run: |
          cp projects/ingest/.env.example projects/ingest/.env
          (cd projects/ingest && docker compose config --quiet)
          (cd projects/ingest && INGEST_IMAGE=placeholder docker compose -f docker-compose.prod.yml config --quiet)
          rm projects/ingest/.env

      - name: Build and push
        uses: docker/build-push-action@v7.2.0
        with:
          context: projects/ingest
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_REPO }}:latest
            ${{ env.IMAGE_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
