name: Build and Push

on:
  push:
    branches: [main]
    paths: ["projects/demo/**", ".github/workflows/build-push.yml"]
  pull_request:
    branches: [main]
    paths: ["projects/demo/**", ".github/workflows/build-push.yml"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: data-lab-demo

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Lowercase image repo
        run: |
          echo "IMAGE_REPO=${REGISTRY}/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/${IMAGE_NAME}" >> "$GITHUB_ENV"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7.2.0
        with:
          context: projects/demo
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_REPO }}:latest
            ${{ env.IMAGE_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
