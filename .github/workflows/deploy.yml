name: Deploy to VPS

on:
  workflow_run:
    workflows: ["Build and Push"]
    types: [completed]
    branches: [main]

jobs:
  deploy-ingest:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Compute image reference
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "INGEST_IMAGE=ghcr.io/${OWNER}/data-lab-ingest:latest" >> "$GITHUB_ENV"

      - name: Set up SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          printf '%s\n' "${VPS_SSH_KEY}" > ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare deploy directory
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" 'mkdir -p ~/ingest'

      - name: Copy production compose
        run: |
          scp projects/ingest/docker-compose.prod.yml \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}":~/ingest/docker-compose.yml

      - name: Pull and restart
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "INGEST_IMAGE='${{ env.INGEST_IMAGE }}' \
             docker compose -f ~/ingest/docker-compose.yml pull --quiet \
             && INGEST_IMAGE='${{ env.INGEST_IMAGE }}' \
             docker compose -f ~/ingest/docker-compose.yml up -d"
