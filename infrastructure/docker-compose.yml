networks:
  web:
    external: true

volumes:
  portainer_data:
  # minio_data:        # placeholder — wired in CP6
  # grafana_data:      # placeholder — wired in CP5
  # prometheus_data:   # placeholder — wired in CP5
  # loki_data:         # placeholder — wired in CP5 (Loki Docker logging driver, not Promtail)

# --- Monitoring (optional, CP5) ------------------------------------------------
# grafana, prometheus, loki: added in CP5

# --- Storage (optional, CP6) ---------------------------------------------------
# minio: added in CP6

services:
  # --- Routing -----------------------------------------------------------------
  traefik:
    image: traefik:v3.7.5
    restart: unless-stopped
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      # Mounted read-only for now; a socket proxy is added in CP8.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=web"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-auth"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"

  # --- Admin / visibility -------------------------------------------------------
  portainer:
    image: portainer/portainer-ce:2.39.4
    restart: unless-stopped
    volumes:
      - portainer_data:/data
      # Mounted read-only for now; a socket proxy is added in CP8.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - web
    labels:
      - "traefik.enable=true"
      # TODO CP3: switch entrypoint to websecure once ACME/HTTP-01 is wired up.
      - "traefik.http.routers.portainer.rule=Host(`portainer.localhost`)"
      - "traefik.http.routers.portainer.entrypoints=web"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
    # NOTE: no admin password is set here — Portainer prompts for one on first
    # login (task 2.8). Set a strong password immediately; don't leave it open.

  # --- Skeleton / proof-of-routing -----------------------------------------------
  whoami:
    image: traefik/whoami:v1.11.0
    restart: unless-stopped
    networks:
      - web
    labels:
      - "traefik.enable=true"
      # TODO CP3: switch entrypoint to websecure once ACME/HTTP-01 is wired up.
      - "traefik.http.routers.whoami.rule=Host(`whoami.localhost`)"
      - "traefik.http.routers.whoami.entrypoints=web"
