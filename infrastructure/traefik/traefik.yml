log:
  level: INFO

api:
  dashboard: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: web

certificatesResolvers:
  le:
    acme:
      email: boulaajoul.tarik@gmail.com
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web
