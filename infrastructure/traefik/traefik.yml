log:
  level: INFO

api:
  dashboard: true

entryPoints:
  web:
    address: ":80"
    # Enable in CP3 (VPS) once ACME/HTTP-01 is wired up below:
    # http:
    #   redirections:
    #     entryPoint:
    #       to: websecure
    #       scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: web

# Enable in CP3 (VPS): Let's Encrypt via HTTP-01 on the `web` entrypoint.
# certificatesResolvers:
#   le:
#     acme:
#       email: you@example.com
#       storage: /letsencrypt/acme.json
#       httpChallenge:
#         entryPoint: web
