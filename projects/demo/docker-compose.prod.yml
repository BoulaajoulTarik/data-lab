networks:
  web:
    external: true

services:
  app:
    image: ${DEMO_IMAGE}
    restart: unless-stopped
    env_file: .env
    networks:
      - web
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.demo.rule=Host(`demo.tarik-lab.dev`)"
      - "traefik.http.routers.demo.entrypoints=websecure"
      - "traefik.http.routers.demo.tls.certresolver=le"
      - "traefik.http.services.demo.loadbalancer.server.port=8000"
